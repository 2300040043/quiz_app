<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Quiz Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quiz-container" id="quiz">
        <div class="header-row">
            <h2 id="question">Question Text Placeholder</h2>
            <div id="timer-box">Time Left: <span id="time-counter">60</span>s</div>
        </div>
        
        <div class="options-grid">
            <button class="option-btn" onclick="selectAnswer(0)">Option 1</button>
            <button class="option-btn" onclick="selectAnswer(1)">Option 2</button>
            <button class="option-btn" onclick="selectAnswer(2)">Option 3</button>
            <button class="option-btn" onclick="selectAnswer(3)">Option 4</button>
        </div>

        <div class="controls">
            <span id="progress">Question 1 of 15</span>
            <button id="next-btn" onclick="loadNextQuestion()" disabled>Next Question</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
